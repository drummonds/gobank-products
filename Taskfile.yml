version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  fmt:
    desc: Format Go source files
    cmds:
      - go fmt ./...

  vet:
    desc: Run Go vet
    cmds:
      - go vet ./...

  test:
    desc: Run tests
    cmds:
      - go test ./...

  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...

  check:
    desc: Run fmt, vet, lint, and test
    cmds:
      - task: fmt
      - task: vet
      - task: lint
      - task: test

  docs:md:
    desc: Convert markdown files to HTML
    cmds:
      - mkdir -p docs
      - task-plus md2html --file index.md --dst docs
      - task-plus md2html --file features.md --dst docs
      - task-plus md2html --file products.md --dst docs
      - task-plus md2html --file interest.md --dst docs
      - task-plus md2html --file api.md --dst docs
      - task-plus md2html --file README.md --dst docs
      - task-plus md2html --file CHANGELOG.md --dst docs
      - task-plus md2html --file ROADMAP.md --dst docs

  docs:build:
    desc: Build all documentation into docs/
    cmds:
      - task: docs:md

  deps:tidy:
    desc: Tidy module dependencies
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - go clean -testcache
